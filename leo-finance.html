// ─── MENSUEL VIEW ─────────────────────────────────────────────────────────────
function MensuelView({boutiques,data,abonnements,setAbonnements}){
  const[sel,setSel]=useState('all');
  const[aboOpen,setAboOpen]=useState({});
  const[newAbo,setNewAbo]=useState({});

  const allWeeks=useMemo(()=>{const s=new Set();boutiques.forEach(b=>Object.keys(data[b.id]||{}).forEach(w=>s.add(w)));return Array.from(s).sort();},[boutiques,data]);
  const months=useMemo(()=>{const m={};allWeeks.forEach(w=>{const k=weekToMonth(w);if(!m[k])m[k]=[];m[k].push(w);});return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));},[allWeeks]);

  const getData=(bid,weeks)=>{
    const rows=[];
    if(bid==='all')boutiques.forEach(b=>weeks.forEach(w=>{const d=data[b.id]?.[w];if(d&&+d.ca)rows.push(d);}));
    else weeks.forEach(w=>{const d=data[bid]?.[w];if(d&&+d.ca)rows.push(d);});
    return sumCalc(rows);
  };

  const getAboTotal=month=>(abonnements[month]||[]).reduce((s,a)=>s+(+a.montant||0),0);

  const addAbo=month=>{
    const a=newAbo[month]||{};
    if(!a.nom?.trim()||!+a.montant)return;
    const item={id:Date.now()+'_'+Math.random().toString(36).slice(2),nom:a.nom.trim(),montant:+a.montant};
    setAbonnements(prev=>({...prev,[month]:[...(prev[month]||[]),item]}));
    setNewAbo(p=>({...p,[month]:{nom:'',montant:''}}));
  };

  const delAbo=(month,id)=>setAbonnements(prev=>({...prev,[month]:(prev[month]||[]).filter(a=>a.id!==id)}));

  if(!months.length)return<div style={{textAlign:'center',padding:'80px 40px',color:'#444',fontSize:15}}>Aucune donnée encore.</div>;
  const bobj=boutiques.find(b=>b.id===sel);
  const ac=sel==='all'?'#8b5cf6':bobj?.color||'#8b5cf6';

  return(
    <div style={{animation:'fadeSlide 0.2s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:4}}>📅 Vue Mensuelle</div>
          <div style={{fontSize:13,color:'#444'}}>Agrégation automatique · Abonnements & charges fixes déductibles</div>
        </div>
        <select value={sel} onChange={e=>setSel(e.target.value)}
          style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'10px 16px',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',outline:'none'}}>
          <option value="all" style={{background:'#1a1a2e'}}>🌐 Toutes les boutiques</option>
          {boutiques.map(b=><option key={b.id} value={b.id} style={{background:'#1a1a2e'}}>{b.icon} {b.name}</option>)}
        </select>
      </div>

      {months.map(([month,weeks])=>{
        const m=getData(sel,weeks);
        if(!m.ca&&!m.ads)return null;
        const aboTotal=getAboTotal(month);
        const benefAjuste=m.benef!=null?m.benef-aboTotal:null;
        const aboList=abonnements[month]||[];
        const isAboOpen=aboOpen[month]!==false;// default open
        const na=newAbo[month]||{nom:'',montant:''};

        return(
          <div key={month} style={{marginBottom:20,borderRadius:20,border:`1px solid ${ac}2a`,background:`${ac}04`,overflow:'hidden'}}>
            {/* Month header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 22px',borderBottom:`1px solid ${ac}18`,background:`${ac}07`}}>
              <div>
                <div style={{fontSize:17,fontWeight:800,color:'#fff',textTransform:'capitalize'}}>{monthLabel(month)}</div>
                <div style={{fontSize:10,color:'#444',marginTop:2}}>{weeks.length} semaines · Sem. {weeks.map(w=>w.split('-W')[1]).join(', ')}</div>
              </div>
              <div style={{display:'flex',gap:20,alignItems:'center'}}>
                <div style={{textAlign:'right'}}><div style={{fontSize:22,fontWeight:900,color:'#10b981'}}>{eur(m.ca_net)}</div><div style={{fontSize:9,color:'#555'}}>CA NET</div></div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:22,fontWeight:900,color:col.benef(m.benef)}}>{eur(m.benef)}</div>
                  <div style={{fontSize:9,color:'#555'}}>BÉNÉF. BRUT</div>
                </div>
                {aboTotal>0&&(
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:22,fontWeight:900,color:col.benef(benefAjuste)}}>{eur(benefAjuste)}</div>
                    <div style={{fontSize:9,color:'#ef4444'}}>BÉNÉF. NET (–{eur(aboTotal)} abo.)</div>
                  </div>
                )}
                <div style={{textAlign:'right'}}><div style={{fontSize:22,fontWeight:900,color:col.roas(m.roas)}}>{xf(m.roas)}</div><div style={{fontSize:9,color:'#555'}}>ROAS</div></div>
              </div>
            </div>

            <div style={{padding:'16px 22px'}}>
              {/* KPIs */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:8}}>
                <KPI label="Marge Brute" value={pct(m.taux_marge_brute)} color={col.marge(m.taux_marge_brute)}/>
                <KPI label="Taux Bénéf." value={pct(m.taux_benef)} color={col.benef(m.benef)}/>
                <KPI label="Conversion" value={pct(m.taux_conversion)} color={col.conv(m.taux_conversion)}/>
                <KPI label="Abandon panier" value={pct(m.taux_abandon_panier)} color={col.abandon(m.taux_abandon_panier)}/>
                <KPI label="Taux retour" value={pct(m.taux_retour)} color={col.retour(m.taux_retour)}/>
                <KPI label="ROI" value={pct(m.roi)} color={col.roi(m.roi)}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:14}}>
                <KPI label="CPA" value={eur(m.cpa)} color="#3b82f6"/>
                <KPI label="AOV" value={eur(m.aov)} color="#a78bfa"/>
                <KPI label="ROAS Net" value={xf(m.roas_net)} color={col.roas(m.roas_net)}/>
                <KPI label="Part Email" value={pct(m.part_email_ca)} color="#ec4899"/>
                <KPI label="Commandes" value={nf(m.commandes)} color="#8b5cf6"/>
                <KPI label="Rev./visite" value={eur(m.revenu_par_visite,2)} color="#10b981"/>
              </div>

              {m.sessions>0&&(
                <div style={{marginBottom:14,padding:'11px 14px',borderRadius:11,background:'rgba(255,255,255,0.025)'}}>
                  <div style={{fontSize:9,color:'#444',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>Funnel mensuel</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
                    <FunnelBar label={`${nf(m.sessions)} sessions`} value={m.sessions} max={m.sessions} color={ac}/>
                    <FunnelBar label={`${nf(m.ajouts_panier)} ajouts (${pct(m.taux_ajout_panier)})`} value={m.ajouts_panier} max={m.sessions} color={ac+'bb'}/>
                    <FunnelBar label={`${nf(m.commandes)} cmd (${pct(m.taux_conversion)})`} value={m.commandes} max={m.sessions} color={ac+'77'}/>
                  </div>
                </div>
              )}

              {/* ── ABONNEMENTS ── */}
              <div style={{borderRadius:14,border:'1px solid rgba(239,68,68,0.18)',background:'rgba(239,68,68,0.04)',overflow:'hidden'}}>
                {/* Header row */}
                <div onClick={()=>setAboOpen(p=>({...p,[month]:!isAboOpen}))}
                  style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',cursor:'pointer',borderBottom:isAboOpen?'1px solid rgba(239,68,68,0.1)':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:14}}>🔄</span>
                    <span style={{fontSize:11,fontWeight:700,color:'#ef4444',textTransform:'uppercase',letterSpacing:1}}>Abonnements & Charges fixes</span>
                    {aboList.length>0&&<span style={{padding:'2px 8px',borderRadius:20,background:'rgba(239,68,68,0.15)',color:'#ef4444',fontSize:10,fontWeight:700}}>{aboList.length} poste{aboList.length>1?'s':''}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    {aboTotal>0&&(
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:14,fontWeight:900,color:'#ef4444'}}>–{eur(aboTotal)}</div>
                        <div style={{fontSize:8,color:'#555'}}>TOTAL MENSUEL</div>
                      </div>
                    )}
                    <span style={{fontSize:14,color:'#333',transform:isAboOpen?'rotate(90deg)':'none',transition:'transform 0.2s',display:'block'}}>›</span>
                  </div>
                </div>

                {isAboOpen&&(
                  <div style={{padding:'14px 16px'}}>
                    {/* List */}
                    {aboList.length>0&&(
                      <div style={{marginBottom:12}}>
                        {aboList.map(a=>(
                          <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:9,background:'rgba(255,255,255,0.03)',marginBottom:5,border:'1px solid rgba(255,255,255,0.06)'}}>
                            <div style={{flex:1,fontSize:12,color:'#bbb',fontWeight:500}}>{a.nom}</div>
                            <div style={{fontSize:13,fontWeight:700,color:'#ef4444'}}>–{eur(+a.montant)}</div>
                            <button onClick={()=>delAbo(month,a.id)}
                              style={{padding:'3px 9px',borderRadius:6,border:'1px solid rgba(239,68,68,0.2)',background:'rgba(239,68,68,0.07)',color:'#ef4444',fontSize:10,cursor:'pointer',fontWeight:600}}
                              onMouseEnter={e=>e.target.style.background='rgba(239,68,68,0.18)'}
                              onMouseLeave={e=>e.target.style.background='rgba(239,68,68,0.07)'}>
                              ✕
                            </button>
                          </div>
                        ))}
                        {/* Total sub-row */}
                        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',borderRadius:9,background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',marginTop:4}}>
                          <span style={{fontSize:11,color:'#888',fontWeight:700}}>Total abonnements</span>
                          <span style={{fontSize:13,fontWeight:900,color:'#ef4444'}}>–{eur(aboTotal)}</span>
                        </div>
                        {m.benef!=null&&(
                          <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',borderRadius:9,background:col.benef(benefAjuste)+'12',border:`1px solid ${col.benef(benefAjuste)}33`,marginTop:4}}>
                            <span style={{fontSize:11,color:'#888',fontWeight:700}}>🎯 Bénéfice net ajusté</span>
                            <span style={{fontSize:14,fontWeight:900,color:col.benef(benefAjuste)}}>{eur(benefAjuste)}</span>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Add form */}
                    <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
                      <div style={{flex:2,minWidth:140}}>
                        <div style={{fontSize:9,color:'#555',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Nom de l'abonnement</div>
                        <input
                          value={na.nom}
                          onChange={e=>setNewAbo(p=>({...p,[month]:{...na,nom:e.target.value}}))}
                          onKeyDown={e=>e.key==='Enter'&&addAbo(month)}
                          placeholder="ex: Shopify Basic, Klaviyo, Pack Canva…"
                          style={{width:'100%',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:9,padding:'8px 11px',color:'#fff',fontSize:12,outline:'none',fontFamily:'inherit'}}
                        />
                      </div>
                      <div style={{flex:1,minWidth:90}}>
                        <div style={{fontSize:9,color:'#555',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Montant (€/mois)</div>
                        <input
                          type="number" min="0" step="any"
                          value={na.montant}
                          onChange={e=>setNewAbo(p=>({...p,[month]:{...na,montant:e.target.value}}))}
                          onKeyDown={e=>e.key==='Enter'&&addAbo(month)}
                          placeholder="29"
                          style={{width:'100%',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:9,padding:'8px 11px',color:'#fff',fontSize:12,outline:'none',fontFamily:'inherit',MozAppearance:'textfield'}}
                        />
                      </div>
                      <button onClick={()=>addAbo(month)}
                        style={{padding:'8px 18px',borderRadius:9,border:'none',background:'rgba(239,68,68,0.18)',color:'#ef4444',fontSize:12,fontWeight:700,cursor:'pointer',height:36,whiteSpace:'nowrap'}}
                        onMouseEnter={e=>e.target.style.background='rgba(239,68,68,0.28)'}
                        onMouseLeave={e=>e.target.style.background='rgba(239,68,68,0.18)'}>
                        + Ajouter
                      </button>
                    </div>

                    {aboList.length===0&&(
                      <div style={{marginTop:10,fontSize:11,color:'#2a2a3a',textAlign:'center',padding:'8px 0'}}>
                        Shopify, Klaviyo, Canva, Google Workspace, logiciels… ajoute tes charges fixes mensuelles ici pour voir ton vrai bénéfice net.
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── GESTION ──────────────────────────────────────────────────────────────────
const COLORS=['#f472b6','#a78bfa','#fbbf24','#34d399','#60a5fa','#f97316','#e879f9','#22d3ee'];
const ICONS=['🛁','👟','🛍️','👗','🎒','👜','🧴','💍','🎁','🌟'];

function GestionView({boutiques,setBoutiques,data,setData}){
  const[nom,setNom]=useState('');
  const[c,setC]=useState(COLORS[0]);
  const[ic,setIc]=useState(ICONS[0]);
  const[show,setShow]=useState(false);

  const add=()=>{
    if(!nom.trim())return;
    const id='b'+Date.now();
    setBoutiques(p=>[...p,{id,name:nom.trim(),color:c,icon:ic}]);
    setNom('');setShow(false);
  };
  const del=(id)=>{
    if(!confirm('Supprimer cette boutique et toutes ses données ?'))return;
    setBoutiques(p=>p.filter(b=>b.id!==id));
    setData(p=>{const n={...p};delete n[id];return n;});
  };

  return(
    <div style={{animation:'fadeSlide 0.2s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:4}}>⚙️ Gestion des Boutiques</div>
          <div style={{fontSize:13,color:'#444'}}>Ajoute, personnalise ou supprime</div>
        </div>
        <button onClick={()=>setShow(s=>!s)} style={{padding:'10px 20px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>
          {show?'✕ Annuler':'+ Nouvelle boutique'}
        </button>
      </div>

      {show&&(
        <div style={{marginBottom:18,padding:'22px',borderRadius:18,border:'1px solid rgba(139,92,246,0.25)',background:'rgba(139,92,246,0.05)'}}>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div style={{flex:1,minWidth:180}}>
              <div style={{fontSize:10,color:'#555',marginBottom:5,fontWeight:700}}>NOM</div>
              <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Nom de la boutique" onKeyDown={e=>e.key==='Enter'&&add()}
                style={{width:'100%',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:9,padding:'9px 12px',color:'#fff',fontSize:14,outline:'none'}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:'#555',marginBottom:5,fontWeight:700}}>ICÔNE</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',maxWidth:220}}>
                {ICONS.map(i=><button key={i} onClick={()=>setIc(i)} style={{width:32,height:32,borderRadius:7,border:`1px solid ${ic===i?'rgba(139,92,246,0.6)':'rgba(255,255,255,0.07)'}`,background:ic===i?'rgba(139,92,246,0.18)':'rgba(255,255,255,0.04)',fontSize:15,cursor:'pointer'}}>{i}</button>)}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:'#555',marginBottom:5,fontWeight:700}}>COULEUR</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {COLORS.map(cl=><button key={cl} onClick={()=>setC(cl)} style={{width:24,height:24,borderRadius:'50%',border:`2px solid ${c===cl?'#fff':'transparent'}`,background:cl,cursor:'pointer',boxShadow:c===cl?`0 0 8px ${cl}88`:'none'}}/>)}
              </div>
            </div>
            <button onClick={add} style={{padding:'9px 22px',borderRadius:9,border:'none',background:'#8b5cf6',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',height:38}}>Créer →</button>
          </div>
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {boutiques.map(b=>{
          const rows=Object.values(data[b.id]||{}).filter(d=>+d.ca);
          const tot=sumCalc(rows);
          return(
            <div key={b.id} style={{display:'flex',alignItems:'center',gap:18,padding:'18px 22px',borderRadius:17,border:`1px solid ${b.color}2a`,background:`${b.color}06`}}>
              <div style={{fontSize:36}}>{b.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:800,color:'#fff'}}>{b.name}</div>
                <div style={{fontSize:11,color:'#444',marginTop:2}}>{rows.length} semaines de données</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,alignItems:'center'}}>
                {[
                  {l:'CA Net',v:eur(tot.ca_net),c:'#10b981'},
                  {l:'Bénéfice',v:eur(tot.benef),c:col.benef(tot.benef)},
                  {l:'ROAS',v:xf(tot.roas),c:col.roas(tot.roas)},
                  {l:'Conversion',v:pct(tot.taux_conversion),c:col.conv(tot.taux_conversion)},
                  {l:'Marge',v:pct(tot.taux_marge_brute),c:col.marge(tot.taux_marge_brute)},
                ].map(k=>(
                  <div key={k.l} style={{textAlign:'right'}}>
                    <div style={{fontSize:15,fontWeight:800,color:k.c}}>{k.v}</div>
                    <div style={{fontSize:9,color:'#555'}}>{k.l}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>del(b.id)} style={{padding:'7px 13px',borderRadius:9,border:'1px solid rgba(239,68,68,0.25)',background:'rgba(239,68,68,0.07)',color:'#ef4444',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all 0.15s',whiteSpace:'nowrap'}}
                onMouseEnter={e=>e.target.style.background='rgba(239,68,68,0.18)'}
                onMouseLeave={e=>e.target.style.background='rgba(239,68,68,0.07)'}>
                Supprimer
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'⬡'},
  {id:'saisie',label:'Saisie',icon:'📝'},
  {id:'mensuel',label:'Mensuel',icon:'📅'},
  {id:'boutiques',label:'Boutiques',icon:'📊'},
  {id:'gestion',label:'Gérer',icon:'⚙️'},
];

function App(){
  const saved=loadState();
  const[boutiques,setBoutiques]=useState(saved?.boutiques||DEFAULT_BOUTIQUES);
  const[data,setData]=useState(saved?.data||{});
  const[abonnements,setAbonnements]=useState(saved?.abonnements||{});
  const[fieldConfig,setFieldConfig]=useState(saved?.fieldConfig||{});
  const[customFields,setCustomFields]=useState(saved?.customFields||{});
  const[fieldOrder,setFieldOrder]=useState(saved?.fieldOrder||{});
  const[view,setView]=useState('dashboard');
  const[activeBoutique,setActiveBoutique]=useState(null);
  const[syncStatus,setSyncStatus]=useState(null);

  // ── Merge API sync data on first load (does NOT overwrite manual fields) ──
  useEffect(()=>{
    const S=window.__SYNC_DATA__;
    if(!S||!S.weeks)return;
    const merged=mergeSync(saved?.data||{},saved?.boutiques||DEFAULT_BOUTIQUES);
    if(merged){
      setData(merged);
      setSyncStatus({last_sync:S.last_sync,days:S.synced_days?.length||0,boutiques_count:Object.keys(S.weeks).length});
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  useEffect(()=>saveState({boutiques,data,abonnements,fieldConfig,customFields,fieldOrder}),[boutiques,data,abonnements,fieldConfig,customFields,fieldOrder]);

  const G=useMemo(()=>{
    const rows=[];boutiques.forEach(b=>Object.values(data[b.id]||{}).forEach(d=>{if(+d.ca)rows.push(d);}));
    return sumCalc(rows);
  },[boutiques,data]);

  const totalWeeks=useMemo(()=>{const s=new Set();boutiques.forEach(b=>Object.keys(data[b.id]||{}).forEach(w=>s.add(w)));return s.size;},[boutiques,data]);

  return(
    <div style={{minHeight:'100vh',background:'#07070f',color:'#fff',display:'flex',fontFamily:"'Inter',-apple-system,sans-serif",overflow:'hidden',position:'relative'}}>
      <style>{`
        @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
        @keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
      `}</style>
      <div style={{position:'fixed',top:'-15%',left:'-5%',width:700,height:700,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,0.07) 0%,transparent 65%)',pointerEvents:'none',animation:'orb1 20s ease-in-out infinite'}}/>
      <div style={{position:'fixed',bottom:'-20%',right:'-8%',width:600,height:600,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.06) 0%,transparent 65%)',pointerEvents:'none',animation:'orb2 25s ease-in-out infinite'}}/>

      {/* Sidebar */}
      <div style={{width:234,flexShrink:0,borderRight:'1px solid rgba(255,255,255,0.05)',padding:'26px 12px',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',background:'rgba(7,7,15,0.97)',backdropFilter:'blur(20px)',zIndex:10}}>
        <div style={{padding:'0 8px 22px'}}>
          <div style={{fontSize:16,fontWeight:900,background:'linear-gradient(135deg,#10b981,#3b82f6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:2}}>Léo Finance OS 💰</div>
          <div style={{fontSize:9,color:'#333',fontWeight:700,textTransform:'uppercase',letterSpacing:1.2}}>Enterprise Tracking</div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:14}}>
          {NAV.map(n=>(
            <div key={n.id}>
              <button onClick={()=>{setView(n.id);if(n.id!=='boutiques')setActiveBoutique(null);}}
                style={{display:'flex',alignItems:'center',gap:9,padding:'10px 12px',borderRadius:12,border:'none',cursor:'pointer',textAlign:'left',width:'100%',fontSize:13,fontWeight:view===n.id&&(n.id!=='boutiques'||!activeBoutique)?700:500,background:view===n.id&&(n.id!=='boutiques'||!activeBoutique)?'rgba(16,185,129,0.13)':'transparent',color:view===n.id&&(n.id!=='boutiques'||!activeBoutique)?'#34d399':'#444',transition:'all 0.15s'}}>
                <span style={{fontSize:14,opacity:view===n.id&&(n.id!=='boutiques'||!activeBoutique)?1:0.5}}>{n.icon}</span>{n.label}
                {view===n.id&&(n.id!=='boutiques'||!activeBoutique)&&<div style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'#10b981'}}/>}
              </button>
              {n.id==='boutiques'&&boutiques.map(b=>(
                <button key={b.id} onClick={()=>{setView('boutiques');setActiveBoutique(b.id);}}
                  style={{display:'flex',alignItems:'center',gap:7,padding:'7px 9px 7px 22px',borderRadius:9,border:'none',cursor:'pointer',textAlign:'left',width:'100%',fontSize:11,fontWeight:activeBoutique===b.id?700:400,background:activeBoutique===b.id?`${b.color}16`:'transparent',color:activeBoutique===b.id?b.color:'#333',transition:'all 0.15s'}}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:b.color,flexShrink:0,boxShadow:activeBoutique===b.id?`0 0 5px ${b.color}`:''}}/>
                  {b.icon} {b.name.length>15?b.name.slice(0,15)+'…':b.name}
                </button>
              ))}
            </div>
          ))}
        </div>

        <div style={{flex:1}}/>

        {/* Global snapshot */}
        <div style={{padding:'12px 10px',borderRadius:12,background:'rgba(16,185,129,0.06)',border:'1px solid rgba(16,185,129,0.1)',marginBottom:10}}>
          <div style={{fontSize:8,color:'#444',fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:8}}>Global · All time</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
            {[
              {l:'CA NET',v:eur(G.ca_net),c:'#10b981'},
              {l:'BÉNÉFICE',v:eur(G.benef),c:col.benef(G.benef)},
              {l:'ROAS',v:xf(G.roas),c:col.roas(G.roas)},
              {l:'CONV.',v:pct(G.taux_conversion),c:col.conv(G.taux_conversion)},
              {l:'MARGE',v:pct(G.taux_marge_brute),c:col.marge(G.taux_marge_brute)},
              {l:'CPA',v:eur(G.cpa),c:'#3b82f6'},
            ].map(k=>(
              <div key={k.l}><div style={{fontSize:12,fontWeight:900,color:k.c,lineHeight:1}}>{k.v}</div><div style={{fontSize:8,color:'#333',marginTop:2}}>{k.l}</div></div>
            ))}
          </div>
        </div>
        {syncStatus&&(
          <div style={{padding:'9px 10px',borderRadius:10,background:'rgba(16,185,129,0.07)',border:'1px solid rgba(16,185,129,0.18)',marginBottom:8,display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#10b981',boxShadow:'0 0 6px #10b981',flexShrink:0,animation:'pulse 2s ease-in-out infinite'}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:9,fontWeight:700,color:'#34d399',letterSpacing:0.5}}>API connectée · {syncStatus.days} jour{syncStatus.days!==1?'s':''}</div>
              <div style={{fontSize:8,color:'#444',marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{timeAgo(syncStatus.last_sync)}</div>
            </div>
          </div>
        )}
        {!syncStatus&&(
          <div style={{padding:'7px 10px',borderRadius:10,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',marginBottom:8,display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#333',flexShrink:0}}/>
            <div style={{fontSize:9,color:'#333',fontWeight:600}}>Sync API non configurée</div>
          </div>
        )}
        <div style={{fontSize:9,color:'#333',textAlign:'center'}}>{totalWeeks} semaines · {boutiques.length} boutiques · 💾 auto-save</div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflowY:'auto',height:'100vh'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'34px 36px',animation:'fadeSlide 0.22s ease'}} key={view+(activeBoutique||'')}>
          {view==='dashboard'&&<DashboardView boutiques={boutiques} data={data}/>}
          {view==='saisie'&&<SaisieView boutiques={boutiques} data={data} setData={setData} fieldConfig={fieldConfig} setFieldConfig={setFieldConfig} customFields={customFields} setCustomFields={setCustomFields} fieldOrder={fieldOrder} setFieldOrder={setFieldOrder}/>}
          {view==='mensuel'&&<MensuelView boutiques={boutiques} data={data} abonnements={abonnements} setAbonnements={setAbonnements}/>}
          {view==='boutiques'&&activeBoutique&&<BoutiqueDetailView boutique={boutiques.find(b=>b.id===activeBoutique)} data={data}/>}
          {view==='boutiques'&&!activeBoutique&&<div style={{textAlign:'center',padding:'80px',color:'#444',fontSize:15}}>← Sélectionne une boutique dans la sidebar</div>}
          {view==='gestion'&&<GestionView boutiques={boutiques} setBoutiques={setBoutiques} data={data} setData={setData}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
